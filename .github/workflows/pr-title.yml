name: PR title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  conventional:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            chore
            ci
            build
            style
            revert
          requireScope: false
          subjectPattern: ^[a-z].+
          subjectPatternError: |
            The PR title subject must start with a lowercase letter.
            Example: feat(dns): add DoH probe for nameservers
